# ld65 configuration for the OSI build (REALIO=2).
# Unlike REALIO=1/3/4, the REALIO=2 switch block (m6502.asm lines 82-88)
# never assigns ROMLOC, so it keeps the file's global default, ^O20000 =
# $2000 -- the same address as the KIM build.  ROMLOC isn't one of the
# config-overridable symbols (m10toca65.py only wraps top-of-file switches;
# ROMLOC's assignments are nested inside REALIO branches), so this can't be
# overridden from the command line either: real OSI ROMs shipped at $A000 or
# $F000, which means this master source must have relied on a manual ROMLOC
# edit outside of what's captured here for the actual OSI ROM burn. See
# PORTING.md section 14b.  Genuine ROM target (ROMSW=1 default): see
# cfg/pet.cfg for why no zero-page preload is required.
MEMORY {
    ZP:    start = $0000, size = $0100, file = "";
    ST01:  start = $00FF, size = $0201, file = "";
    ROM:   start = $2000, size = $4000, fill = no, file = %O;
}

SEGMENTS {
    ZP:    load = ZP,   type = rw;
    ST01:  load = ST01, type = rw;
    CODE:  load = ROM,  type = rw;
}
