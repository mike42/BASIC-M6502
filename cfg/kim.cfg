# ld65 configuration for the KIM-1 build (REALIO=1).
# The output file contains only the code image at $2000, comparable to the
# KB9 (KIM BASIC V1.1) cassette image.  Page zero / page one segments are
# assembled for their addresses but not emitted; INIT sets them up at
# runtime.

# ZP initial image goes to a side file: the RAM build expects page zero
# (JMP vectors, CHRGET) loaded along with the program, like the original
# PDP-10 "load all of RAM" model.  Emulator harnesses load it at $0000.
MEMORY {
    ZP:    start = $0000, size = $0100, file = "build/kim.zp";
    ST01:  start = $00FF, size = $0201, file = "";
    ROM:   start = $2000, size = $4000, fill = no, file = %O;
}

SEGMENTS {
    ZP:    load = ZP,   type = rw;
    ZP80:  load = ZP,   type = rw, optional = yes;  # Apple only
    ST01:  load = ST01, type = rw;
    CODE:  load = ROM,  type = rw;
}
