# ld65 configuration for the Commodore PET build (REALIO=3).
# ROMLOC=$C000 is computed by the source itself for REALIO=3 (the standard
# PET BASIC ROM socket address) -- no override needed.  This is a genuine
# ROM target (ROMSW=1, the checked-in default): INIT's MOVCHG loop copies
# CHRGET's self-modifying code from the ROM-resident INITAT template into
# zero page at boot, so -- unlike the KIM/KB9 build -- no zero-page image
# needs to be preloaded by the harness; real PET hardware boots the same way
# from garbage RAM.
MEMORY {
    ZP:    start = $0000, size = $0100, file = "";
    ST01:  start = $00FF, size = $0201, file = "";
    ROM:   start = $C000, size = $4000, fill = no, file = %O;
}

SEGMENTS {
    ZP:    load = ZP,   type = rw;
    ST01:  load = ST01, type = rw;
    CODE:  load = ROM,  type = rw;
}
