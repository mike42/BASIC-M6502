# ld65 configuration for the Apple II build (REALIO=4, the source's own
# default -- REALIO=4 needs no -D override at all).  ROMLOC=$0800, the
# standard Applesoft-cassette load address; RAMLOC=$2A00 ("PAGE 2A") holds
# variables.  Genuine ROM target (ROMSW=1 default): see cfg/pet.cfg for why
# no zero-page preload is required.  The extra Apple-only zero-page block
# (source's "ORG 80 ;ROOM FOR APPLE PAGE 0 STUFF") lives inside the same ZP
# segment -- m10toca65.py emits it as a bare .org, not a separate segment.
MEMORY {
    ZP:    start = $0000, size = $0100, file = "";
    ST01:  start = $00FF, size = $0201, file = "";
    ROM:   start = $0800, size = $4000, fill = no, file = %O;
}

SEGMENTS {
    ZP:    load = ZP,   type = rw;
    ST01:  load = ST01, type = rw;
    CODE:  load = ROM,  type = rw;
}
